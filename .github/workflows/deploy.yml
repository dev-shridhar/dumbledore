name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USER: ${{ secrets.PA_USER }}
        run: |
          echo "--- Secret validation ---"
          if [ -z "${PA_TOKEN}" ]; then
            echo "ERROR: PA_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${PA_USER}" ]; then
            echo "ERROR: PA_USER secret is not set"
            exit 1
          fi
          echo "PA_USER length: ${#PA_USER} chars (set)"
          echo "PA_TOKEN length: ${#PA_TOKEN} chars (set)"

      - name: Test API connection
        env:
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USER: ${{ secrets.PA_USER }}
        run: |
          API="https://www.pythonanywhere.com/api/v0/user/${PA_USER}"
          echo "Testing API connection to: ${API}/cpu/"
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: Token ${PA_TOKEN}" \
            "${API}/cpu/")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "HTTP status: ${HTTP_CODE}"
          echo "Response: ${BODY}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: API connection failed. Check PA_TOKEN and PA_USER."
            echo "If your account is on EU servers, you may need to update the host."
            exit 1
          fi

      - name: Upload files to PythonAnywhere
        env:
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USER: ${{ secrets.PA_USER }}
        run: |
          API="https://www.pythonanywhere.com/api/v0/user/${PA_USER}"
          AUTH="Authorization: Token ${PA_TOKEN}"
          REMOTE_DIR="/home/${PA_USER}/dumbledore"

          echo "📦 Uploading files to ${REMOTE_DIR}/..."
          for file in $(find . -type f \
              -not -path './.git/*' \
              -not -path './.github/*' \
              -not -name '.DS_Store' \
              -not -name '*.pyc' \
              -not -path './__pycache__/*'); do
            remote_path="${REMOTE_DIR}/${file#./}"
            echo "  Uploading: ${file} -> ${remote_path}"
            curl -s -X POST "${API}/files/path${remote_path}" \
              -H "${AUTH}" \
              -F "content=@${file}"
            echo ""
          done

      - name: Upload .env to PythonAnywhere
        env:
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USER: ${{ secrets.PA_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
        run: |
          API="https://www.pythonanywhere.com/api/v0/user/${PA_USER}"
          AUTH="Authorization: Token ${PA_TOKEN}"
          REMOTE_DIR="/home/${PA_USER}/dumbledore"

          echo "🔐 Uploading .env file..."
          cat > /tmp/.env << EOF
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          GROQ_API_KEY=${GROQ_API_KEY}
          BOT_USERNAME=${BOT_USERNAME}
          EOF
          curl -s -X POST "${API}/files/path${REMOTE_DIR}/.env" \
            -H "${AUTH}" \
            -F "content=@/tmp/.env"
          echo ""

          echo ""
          echo "✅ Files uploaded to PythonAnywhere!"
          echo ""
          echo "=========================================="
          echo "  NEXT STEPS (one-time manual setup):"
          echo "=========================================="
          echo ""
          echo "1. Log into PythonAnywhere: https://www.pythonanywhere.com/login/"
          echo "2. Open a Bash console from the Dashboard"
          echo "3. Run these commands:"
          echo ""
          echo "   pip3 install -r ~/dumbledore/requirements.txt --user"
          echo "   cd ~/dumbledore && nohup python3 run_bot.py > bot.log 2>&1 &"
          echo ""
          echo "4. To check bot status: tail -f ~/dumbledore/bot.log"
          echo "5. To restart after future deploys:"
          echo "   pkill -f run_bot.py || true"
          echo "   cd ~/dumbledore && nohup python3 run_bot.py > bot.log 2>&1 &"
          echo "=========================================="
